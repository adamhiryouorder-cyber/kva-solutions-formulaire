[build]
  functions = "netlify/functions"
  command = "npm install"

[[blobs]]
  name = "kva-pdfs"
  access = "public"

[[redirects]]
  from = "/favicon.png"
  to = "/favicon.png"
  status = 200

[[redirects]]
  from = "/kva-intro-loop.mp4"
  to = "/kva-intro-loop.mp4"
  status = 200

# ===== APP (espace installateur) =====

[[redirects]]
  from = "/signin"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/signin/"
  to = "/signin"
  status = 301
  force = true

[[redirects]]
  from = "/suivi"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/shop"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/formulaire"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/formulaire/*"
  to = "/index.html"
  status = 200
  force = true

# ===== SITE VITRINE =====

[[redirects]]
  from = "/"
  to = "/site.html"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/site.html"
  status = 200
  force = true
