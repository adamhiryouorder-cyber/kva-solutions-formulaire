[build]
  functions = "netlify/functions"
  command = "npm install"

[[blobs]]
  name = "kva-pdfs"
  access = "public"

[[redirects]]
  from = "/signin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/signin/"
  to = "/signin"
  status = 301

[[redirects]]
  from = "/*"
  to = "/site.html"
  status = 200
